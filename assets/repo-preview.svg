<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-label="OpenClaw Multi-Agent Wizard repository preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#042F2E"/>
      <stop offset="55%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#99F6E4"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#F0FDFA"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#042F2E" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1100" cy="120" r="140" fill="#CCFBF1" opacity="0.14"/>
  <circle cx="180" cy="610" r="180" fill="#5EEAD4" opacity="0.14"/>

  <g filter="url(#shadow)">
    <rect x="78" y="74" width="1124" height="572" rx="28" fill="#062F2F" opacity="0.16"/>
    <rect x="88" y="64" width="1104" height="572" rx="28" fill="#F8FAFC"/>
  </g>

  <rect x="88" y="64" width="1104" height="68" rx="28" fill="#E6FFFB"/>
  <circle cx="132" cy="98" r="9" fill="#F97316"/>
  <circle cx="160" cy="98" r="9" fill="#FACC15"/>
  <circle cx="188" cy="98" r="9" fill="#10B981"/>

  <g transform="translate(132 190)">
    <rect x="0" y="0" width="246" height="280" rx="24" fill="url(#card)"/>
    <text x="28" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#115E59">Mode</text>
    <rect x="28" y="78" width="190" height="44" rx="14" fill="#CCFBF1"/>
    <text x="48" y="107" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#134E4A">Multi-bot</text>
    <rect x="28" y="138" width="190" height="44" rx="14" fill="#DCFCE7"/>
    <text x="48" y="167" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#166534">Single-bot</text>
    <rect x="28" y="198" width="190" height="44" rx="14" fill="#E0F2FE"/>
    <text x="48" y="227" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" fill="#0C4A6E">A2A</text>
  </g>

  <g transform="translate(438 188)">
    <rect x="0" y="0" width="322" height="286" rx="24" fill="#FCFFFE"/>
    <text x="34" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#115E59">Wizard</text>
    <text x="34" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Preflight</text>
    <rect x="34" y="108" width="244" height="10" rx="5" fill="#CCFBF1"/>
    <text x="34" y="152" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Create agents</text>
    <rect x="34" y="165" width="188" height="10" rx="5" fill="#99F6E4"/>
    <text x="34" y="209" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Bind Feishu</text>
    <rect x="34" y="222" width="210" height="10" rx="5" fill="#5EEAD4"/>
    <text x="34" y="266" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Verify result</text>
    <rect x="34" y="279" width="170" height="10" rx="5" fill="#2DD4BF"/>
  </g>

  <g transform="translate(816 188)">
    <rect x="0" y="0" width="260" height="286" rx="24" fill="#FCFFFE"/>
    <text x="30" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#115E59">Profiles</text>
    <g font-family="Consolas, Courier New, monospace" font-size="18" fill="#0F172A">
      <text x="30" y="98">IDENTITY.md</text>
      <text x="30" y="132">SOUL.md</text>
      <text x="30" y="166">AGENTS.md</text>
      <text x="30" y="200">MEMORY.md</text>
      <text x="30" y="234">TOOLS.md</text>
      <text x="30" y="268">USER.md</text>
    </g>
  </g>

  <text x="132" y="558" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700" fill="#F8FAFC">OpenClaw Multi-Agent Wizard</text>
  <text x="132" y="610" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#D1FAE5">Beginner-friendly setup for bots, agents, Feishu routing, and starter profiles</text>
</svg>
