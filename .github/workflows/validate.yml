name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile helper scripts
        run: python -m compileall scripts

      - name: Check required repository files
        run: |
          test -f README.md
          test -f LICENSE
          test -f SKILL.md
          test -f agents/openai.yaml
